# HealVN — Docker Compose for Full Stack Deployment
#
# Services:
# - erpnext: Frappe/ERPNext with HealVN custom app
# - mariadb: Database (MariaDB 10.11)
# - redis-cache: Cache store
# - redis-queue: Background job queue
# - nginx: Reverse proxy serving frontend + ERPNext
#
# Usage:
#   docker compose up -d
#   docker compose exec erpnext bench new-site healvn.local --install-app erpnext --install-app healvn
#
# Access:
#   Frontend:  http://localhost:8080
#   ERPNext:   http://localhost:8080/api / http://localhost:8080/app
#   Admin:     http://localhost:8080/app (login: Administrator / admin)

version: "3.8"

services:
  # ─── MariaDB ────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: healvn-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-healvn_root_2025}
      MYSQL_DATABASE: _healvn
      MYSQL_USER: ${DB_USER:-healvn}
      MYSQL_PASSWORD: ${DB_PASSWORD:-healvn_db_2025}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mariadb.cnf:/etc/mysql/mariadb.conf.d/healvn.cnf
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ────────────────────────────────────────
  redis-cache:
    image: redis:7-alpine
    container_name: healvn-redis-cache
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data
    ports:
      - "6380:6379"

  # ─── Redis Queue ────────────────────────────────────────
  redis-queue:
    image: redis:7-alpine
    container_name: healvn-redis-queue
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data
    ports:
      - "6381:6379"

  # ─── ERPNext (Frappe) Backend ───────────────────────────
  erpnext:
    image: frappe/erpnext:v15
    container_name: healvn-erpnext
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    environment:
      - FRAPPE_SITE_NAME_HEADER=healvn.local
      - DB_HOST=mariadb
      - DB_PORT=3306
      - REDIS_CACHE=redis://redis-cache:6379
      - REDIS_QUEUE=redis://redis-queue:6379
      - SOCKETIO_PORT=9000
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
      - ./erpnext_app:/home/frappe/frappe-bench/apps/healvn
    ports:
      - "8000:8000"

  # ─── Frappe Worker (Background Jobs) ───────────────────
  erpnext-worker:
    image: frappe/erpnext:v15
    container_name: healvn-worker
    restart: unless-stopped
    depends_on:
      - erpnext
    command: bench worker --queue short,default,long
    environment:
      - DB_HOST=mariadb
      - REDIS_CACHE=redis://redis-cache:6379
      - REDIS_QUEUE=redis://redis-queue:6379
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
      - ./erpnext_app:/home/frappe/frappe-bench/apps/healvn

  # ─── Frappe Scheduler ──────────────────────────────────
  erpnext-scheduler:
    image: frappe/erpnext:v15
    container_name: healvn-scheduler
    restart: unless-stopped
    depends_on:
      - erpnext
    command: bench schedule
    environment:
      - DB_HOST=mariadb
      - REDIS_CACHE=redis://redis-cache:6379
      - REDIS_QUEUE=redis://redis-queue:6379
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
      - ./erpnext_app:/home/frappe/frappe-bench/apps/healvn

  # ─── Nginx (Frontend + Reverse Proxy) ──────────────────
  nginx:
    image: nginx:alpine
    container_name: healvn-nginx
    restart: unless-stopped
    depends_on:
      - erpnext
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./index.html:/usr/share/nginx/html/index.html
      - ./pages:/usr/share/nginx/html/pages
      - ./css:/usr/share/nginx/html/css
      - ./js:/usr/share/nginx/html/js
      - ./assets:/usr/share/nginx/html/assets
    ports:
      - "8080:80"

volumes:
  mariadb-data:
  redis-cache-data:
  redis-queue-data:
  erpnext-sites:
  erpnext-logs:
